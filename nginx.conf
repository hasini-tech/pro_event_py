events {
  worker_connections 1024;
}

http {
  # ── Upstream service definitions ─────────────────────────────────────────────
  upstream user_svc     { server user-service:8001;     }
  upstream event_svc    { server event-service:8002;    }
  upstream ticket_svc   { server ticket-service:8003;   }
  upstream payment_svc  { server payment-service:8004;  }
  upstream attendee_svc { server attendee-service:8005; }

  # ── Rate limiting ────────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  server {
    listen 80;
    server_name _;

    # Global headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Increase for webhook payloads
    client_max_body_size 10M;

    # ── Route: /api/users/* → User Service ──────────────────────────────────
    location /api/users/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://user_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Route: /api/events/* → Event Service ────────────────────────────────
    location /api/events/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://event_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Route: /api/tickets/* → Ticket Service ──────────────────────────────
    location /api/tickets/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://ticket_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Route: /api/payments/webhook — no rate limit (Stripe needs raw body) ─
    location /api/payments/webhook {
      proxy_pass         http://payment_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # ── Route: /api/payments/* → Payment Service ────────────────────────────
    location /api/payments/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://payment_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Route: /api/attendees/* → Attendee Service ──────────────────────────
    location /api/attendees/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://attendee_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Fallback 404 ────────────────────────────────────────────────────────
    location / {
      return 404 '{"error": "Route not found"}';
      add_header Content-Type application/json;
    }
  }
}
