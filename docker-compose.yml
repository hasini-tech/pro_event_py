version: "3.9"

services:
  # ── Databases (one per service) ──────────────────────────────────────────────
  postgres-users:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes: [pgdata-users:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  postgres-events:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes: [pgdata-events:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  postgres-tickets:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes: [pgdata-tickets:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  postgres-payments:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes: [pgdata-payments:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  postgres-attendees:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: attendees_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes: [pgdata-attendees:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  # ── Kafka + Zookeeper ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes: [zk-data:/var/lib/zookeeper/data]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: always
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes: [kafka-data:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 10
      start_period: 30s

  # ── Microservices ─────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user_service
        PORT: "8001"
    restart: always
    ports: ["8001:8001"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres-users:5432/users_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-users:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/users/health"]
      interval: 15s
      retries: 5

  event-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: event_service
        PORT: "8002"
    restart: always
    ports: ["8002:8002"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres-events:5432/events_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      USER_SERVICE_URL: http://user-service:8001
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-events:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ticket-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ticket_service
        PORT: "8003"
    restart: always
    ports: ["8003:8003"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres-tickets:5432/tickets_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      USER_SERVICE_URL: http://user-service:8001
      ATTENDEE_SERVICE_URL: http://attendee-service:8005
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-tickets:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment_service
        PORT: "8004"
    restart: always
    ports: ["8004:8004"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres-payments:5432/payments_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      USER_SERVICE_URL: http://user-service:8001
      ATTENDEE_SERVICE_URL: http://attendee-service:8005
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy

  attendee-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: attendee_service
        PORT: "8005"
    restart: always
    ports: ["8005:8005"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres-attendees:5432/attendees_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      USER_SERVICE_URL: http://user-service:8001
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TICKET_SERVICE_URL: http://ticket-service:8003
    depends_on:
      postgres-attendees:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Nginx API Gateway ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports: ["80:80"]
    volumes: [./nginx.conf:/etc/nginx/nginx.conf:ro]
    depends_on:
      - user-service
      - event-service
      - ticket-service
      - payment-service
      - attendee-service

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_USER_API_URL: http://user-service:8001
      NEXT_PUBLIC_EVENT_API_URL: http://event-service:8002
      NEXT_PUBLIC_TICKET_API_URL: http://ticket-service:8003
      NEXT_PUBLIC_PAYMENT_API_URL: http://payment-service:8004
      NEXT_PUBLIC_ATTENDEE_API_URL: http://attendee-service:8005
      NEXT_PUBLIC_API_URL: http://localhost:80
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on: [nginx]

volumes:
  pgdata-users:
  pgdata-events:
  pgdata-tickets:
  pgdata-payments:
  pgdata-attendees:
  zk-data:
  kafka-data:
